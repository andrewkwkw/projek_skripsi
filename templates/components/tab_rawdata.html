<div id="page-rawdata" class="p-6 hidden flex-1 flex flex-col h-[calc(100vh-4rem)] space-y-4">
    <div class="flex items-center gap-4 shrink-0">
        <div class="wazuh-panel px-4 py-2 w-full flex items-center gap-2">
            <i class="fa-solid fa-search text-textMuted text-xs"></i>
            <input type="text" id="log-search" onkeyup="filterLogs()" placeholder="KQL query..." class="bg-transparent border-none outline-none w-full text-textMain text-sm">
        </div>
        <button id="btn-livetail" onclick="toggleLiveTail()" class="shrink-0 bg-panel border border-borderWazuh text-textMain hover:bg-gray-700 px-4 py-2 rounded transition-colors flex items-center gap-2 text-sm font-medium">
            <i class="fa-solid fa-pause text-warning" id="icon-livetail"></i> <span id="text-livetail">Pause Live Tail</span>
        </button>
    </div>

    <div class="wazuh-panel flex flex-col overflow-hidden flex-1 min-h-0 h-full">
        <div class="px-4 py-2 border-b border-borderWazuh bg-panel flex items-center justify-between shrink-0">
            <h3 class="font-medium text-sm text-textMain">Discover (Raw auth.log)</h3>
        </div>
        <div class="flex-1 overflow-y-auto p-4 text-xs font-mono text-gray-400 bg-dark whitespace-pre" id="log-raw"></div>
    </div>
</div>
